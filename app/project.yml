name: mudd
options:
  bundleIdPrefix: io.vetcoders
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true

settings:
  base:
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    SWIFT_VERSION: "6.0"

targets:
  mudd:
    type: application
    platform: macOS
    sources:
      - path: mudd
        excludes:
          - "Bridge/mudd_ffiFFI.h"
          - "Bridge/mudd_ffiFFI.modulemap"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.vetcoders.mudd
        INFOPLIST_GENERATION_MODE: GeneratedFile
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: 1
        GENERATE_INFOPLIST_FILE: true
        LIBRARY_SEARCH_PATHS:
          - "$(PROJECT_DIR)/../target/release"
        SWIFT_OBJC_BRIDGING_HEADER: "mudd/Bridge/mudd_ffiFFI.h"
        OTHER_LDFLAGS:
          - "-lmudd_ffi"
          - "-framework"
          - "CoreML"
          - "-framework"
          - "Security"
          - "-framework"
          - "SystemConfiguration"
        HEADER_SEARCH_PATHS:
          - "$(PROJECT_DIR)/mudd/Bridge"
    preBuildScripts:
      - name: "Build Rust FFI"
        script: |
          cd "${PROJECT_DIR}/.."
          ./scripts/build-rust.sh
        basedOnDependencyAnalysis: false
